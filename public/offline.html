<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — GSM Driving School</title>
    <meta name="theme-color" content="#1f3a2e" />
    <link rel="icon" href="/__l5e/assets-v1/77777731-ccc0-492e-a907-aa63024328b5/icon-192.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; background: #1f3a2e; color: #f5efe6; }
      main { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { max-width: 480px; text-align: center; }
      .badge { display: inline-block; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,0.12); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
      h1 { font-size: 28px; margin: 18px 0 10px; }
      p { opacity: 0.85; line-height: 1.5; }
      .actions { margin-top: 22px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      a, button { display: inline-block; padding: 12px 18px; border-radius: 10px; font-weight: 600; border: 0; cursor: pointer; text-decoration: none; }
      .primary { background: #e07a5f; color: #fff; }
      .ghost { background: transparent; color: #f5efe6; border: 1px solid rgba(255,255,255,0.3); }
      ul { text-align: left; margin: 22px auto 0; padding: 0 0 0 18px; max-width: 320px; }
      li { margin: 6px 0; opacity: 0.85; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <span class="badge">Offline</span>
        <h1>You're offline</h1>
        <p>We couldn't reach the internet, but pages you've already opened in the GSM app should still work.</p>
        <ul>
          <li>Theory test materials you opened earlier</li>
          <li>Lesson notes and saved progress</li>
          <li>Contact details and opening hours</li>
        </ul>
        <div class="actions">
          <button class="primary" onclick="location.reload()">Try again</button>
          <a class="ghost" href="/">Go home</a>
        </div>
      </div>
    </main>
  </body>
</html>
