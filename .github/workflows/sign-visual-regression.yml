name: Sign Visual Regression

on:
  pull_request:
  push:
    branches: [main]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-
            playwright-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps ${{ matrix.browser }}
      - name: Start dev server
        run: |
          bun run dev &
          echo $! > /tmp/dev.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080 >/dev/null; then
              echo "dev server ready"; exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"; exit 1
      - name: Run sign variant visual regression
        env:
          BROWSER: ${{ matrix.browser }}
        run: bun tests/visual/signvariants/test.ts
      - name: Ensure visual artifacts exist
        if: failure()
        run: |
          mkdir -p tests/visual/signvariants/current tests/visual/signvariants/diff
          touch tests/visual/signvariants/current/.artifact-placeholder
          touch tests/visual/signvariants/diff/.artifact-placeholder
      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sign-variants-diff-${{ matrix.browser }}
          path: |
            tests/visual/signvariants/current
            tests/visual/signvariants/diff
      - name: Stop dev server
        if: always()
        run: kill $(cat /tmp/dev.pid) || true
