name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (nitro cloudflare-module)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Inspect build output
        run: |
          echo "--- project root ---"
          ls -la
          echo "--- dist/ ---"
          ls -la dist || echo "no dist/"
          echo "--- .wrangler/deploy/config.json ---"
          cat .wrangler/deploy/config.json 2>/dev/null || echo "no deploy config"
          echo "--- dist/server/wrangler.json ---"
          cat dist/server/wrangler.json 2>/dev/null || echo "no wrangler.json in dist/server"

      - name: Locate Nitro wrangler config
        id: wrangler_config
        run: |
          set -e
          # Nitro's cloudflare-module preset generates a wrangler config next to the built worker.
          # Try the known locations in order.
          for candidate in \
            dist/server/wrangler.json \
            dist/server/wrangler.jsonc \
            .output/server/wrangler.json \
            .output/wrangler.json; do
            if [ -f "$candidate" ]; then
              echo "Found wrangler config at $candidate"
              echo "config_path=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "::error::Could not locate a generated wrangler config after build"
          find . -maxdepth 4 -name 'wrangler.json*' -not -path './node_modules/*' || true
          exit 1

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config ${{ steps.wrangler_config.outputs.config_path }}

      - name: Sync runtime secrets to Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_CONFIG_PATH: ${{ steps.wrangler_config.outputs.config_path }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -e
          put() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::notice::Skipping $name (not set in GitHub secrets)"
              return 0
            fi
            echo "Uploading $name to Worker"
            printf '%s' "$value" | bunx wrangler secret put "$name" --config "$WRANGLER_CONFIG_PATH"
          }
          put SUPABASE_URL
          put SUPABASE_PUBLISHABLE_KEY
          put SUPABASE_SERVICE_ROLE_KEY
          put LOVABLE_API_KEY
          put TURNSTILE_SECRET_KEY
          put SENTRY_DSN