name: Homepage section order

on:
  push:
  pull_request:

jobs:
  section-order:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
    name: section-order (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright (Python)
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps ${{ matrix.browser }}
      - name: Start dev server
        run: |
          bun run dev &
          echo $! > /tmp/dev.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080/ >/dev/null; then
              echo "dev server ready"; exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"; exit 1
      - name: Run section-order check
        env:
          BROWSER: ${{ matrix.browser }}
        run: python3 tests/section-order/check.py
      - name: Stop dev server
        if: always()
        run: kill $(cat /tmp/dev.pid) || true
