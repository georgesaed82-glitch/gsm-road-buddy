name: Homepage section order

on:
  push:
  pull_request:

jobs:
  section-order:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: section-order (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ matrix.browser }}-
            playwright-${{ runner.os }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps ${{ matrix.browser }}
      - name: Start dev server
        run: |
          bun run dev &
          echo $! > /tmp/dev.pid
          for i in {1..60}; do
            if curl -sf http://localhost:8080/ >/dev/null; then
              echo "dev server ready"; exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"; exit 1
      - name: Run section-order check
        env:
          BROWSER: ${{ matrix.browser }}
        run: bun tests/section-order/check.ts
      - name: Stop dev server
        if: always()
        run: kill $(cat /tmp/dev.pid) || true
